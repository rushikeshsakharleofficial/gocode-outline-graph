name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BINARY: code-outline-graph-go

jobs:
  # ── 1. Build binaries (native CGo per platform) ─────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            apt: gcc-aarch64-linux-gnu
            cc: aarch64-linux-gnu-gcc
            ext: ""
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            apt: gcc-mingw-w64-x86-64
            cc: x86_64-w64-mingw32-gcc
            ext: ".exe"
          - os: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install cross-compiler
        if: matrix.apt != ''
        run: sudo apt-get install -y ${{ matrix.apt }}

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc || '' }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUTNAME="${BINARY}_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          mkdir -p dist
          go build -buildvcs=false -tags fts5 -ldflags="-s -w" \
            -o "dist/${BINARY}${{ matrix.ext }}" \
            ./cmd/code-outline-graph/

          # Package into archive (run from repo root, not from dist/)
          if [ "${{ matrix.goos }}" = "windows" ]; then
            (cd dist && zip "${OUTNAME}.zip" "${BINARY}.exe")
          else
            (cd dist && tar czf "${OUTNAME}.tar.gz" "${BINARY}")
          fi
          ls -lh dist/

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  # ── 2. Build Linux packages (deb / rpm / apk) ───────────────────────────────
  packages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: bin-linux-amd64
          path: dist/

      - name: Extract linux/amd64 binary
        run: |
          cd dist
          ARCHIVE=$(ls *.tar.gz | head -1)
          tar xf "$ARCHIVE"
          ls -lh

      - name: Install nfpm
        run: |
          NFPM_VERSION=2.37.1
          wget -qO /tmp/nfpm.deb \
            "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_amd64.deb"
          sudo dpkg -i /tmp/nfpm.deb

      - name: Build packages
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          mkdir -p packages

          # nfpm reads binary from current dir; copy it
          cp dist/code-outline-graph-go .

          for FMT in deb rpm apk; do
            VERSION="$VER" nfpm pkg \
              --config packaging/nfpm.yml \
              --packager "$FMT" \
              --target packages/
          done

          # archlinux package (using nfpm)
          VERSION="$VER" nfpm pkg \
            --config packaging/nfpm.yml \
            --packager archlinux \
            --target packages/ || true  # non-fatal if packager unavailable

          ls -lh packages/

      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: packages/
          if-no-files-found: warn

  # ── 3. Create GitHub Release ────────────────────────────────────────────────
  release:
    needs: [build, packages]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: release-assets/

      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: release-assets/
        continue-on-error: true

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          gh release create "${VERSION}" \
            --title "${VERSION}" \
            --notes "$(cat <<'NOTES'
          ## Installation

          ### macOS (Homebrew)
          ```bash
          brew tap rushikeshsakharleofficial/tap
          brew install code-outline-graph-go
          ```

          ### Windows (Scoop)
          ```powershell
          scoop bucket add rushikesh https://github.com/rushikeshsakharleofficial/scoop-bucket
          scoop install code-outline-graph-go
          ```

          ### Linux / macOS / Windows (install script)
          ```bash
          curl -fsSL https://raw.githubusercontent.com/rushikeshsakharleofficial/gocode-outline-graph/main/install.sh | bash
          ```

          ### Arch Linux (AUR)
          ```bash
          yay -S code-outline-graph-go-bin
          ```
          NOTES
          )" \
            release-assets/*

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"

          # Compute checksums for darwin and linux archives
          SHA_DARWIN_AMD64=$(sha256sum release-assets/code-outline-graph-go_${VER}_darwin_amd64.tar.gz | awk '{print $1}')
          SHA_DARWIN_ARM64=$(sha256sum release-assets/code-outline-graph-go_${VER}_darwin_arm64.tar.gz | awk '{print $1}')
          SHA_LINUX_AMD64=$(sha256sum release-assets/code-outline-graph-go_${VER}_linux_amd64.tar.gz | awk '{print $1}')
          SHA_LINUX_ARM64=$(sha256sum release-assets/code-outline-graph-go_${VER}_linux_arm64.tar.gz | awk '{print $1}')

          # Clone tap, update formula, push
          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/rushikeshsakharleofficial/homebrew-tap.git" \
            tap-repo
          cat > tap-repo/Formula/code-outline-graph-go.rb << FORMULA
          class CodeOutlineGraphGo < Formula
            desc "Go code indexing and search MCP server — tree-sitter symbols over SQLite FTS5"
            homepage "https://github.com/rushikeshsakharleofficial/gocode-outline-graph"
            license "MIT"
            version "${VER}"

            on_macos do
              on_arm do
                url "https://github.com/rushikeshsakharleofficial/gocode-outline-graph/releases/download/${VERSION}/code-outline-graph-go_${VER}_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/rushikeshsakharleofficial/gocode-outline-graph/releases/download/${VERSION}/code-outline-graph-go_${VER}_darwin_amd64.tar.gz"
                sha256 "${SHA_DARWIN_AMD64}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/rushikeshsakharleofficial/gocode-outline-graph/releases/download/${VERSION}/code-outline-graph-go_${VER}_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/rushikeshsakharleofficial/gocode-outline-graph/releases/download/${VERSION}/code-outline-graph-go_${VER}_linux_amd64.tar.gz"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              bin.install "code-outline-graph-go"
            end

            test do
              assert_match "${VER}", shell_output("#{bin}/code-outline-graph-go version")
            end
          end
          FORMULA

          cd tap-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/code-outline-graph-go.rb
          git commit -m "Update code-outline-graph-go to ${VERSION}"
          git push

      - name: Update Scoop manifest
        env:
          SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          SHA_WIN=$(sha256sum release-assets/code-outline-graph-go_${VER}_windows_amd64.zip | awk '{print $1}')

          git clone \
            "https://x-access-token:${SCOOP_BUCKET_TOKEN}@github.com/rushikeshsakharleofficial/scoop-bucket.git" \
            scoop-repo
          cat > scoop-repo/code-outline-graph-go.json << JSON
          {
            "version": "${VER}",
            "description": "Go code indexing and search MCP server — tree-sitter symbols over SQLite FTS5",
            "homepage": "https://github.com/rushikeshsakharleofficial/gocode-outline-graph",
            "license": "MIT",
            "architecture": {
              "64bit": {
                "url": "https://github.com/rushikeshsakharleofficial/gocode-outline-graph/releases/download/${VERSION}/code-outline-graph-go_${VER}_windows_amd64.zip",
                "hash": "${SHA_WIN}",
                "bin": "code-outline-graph-go.exe"
              }
            },
            "checkver": {
              "github": "https://github.com/rushikeshsakharleofficial/gocode-outline-graph"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/rushikeshsakharleofficial/gocode-outline-graph/releases/download/v\$version/code-outline-graph-go_\$version_windows_amd64.zip"
                }
              }
            }
          }
          JSON

          cd scoop-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add code-outline-graph-go.json
          git commit -m "Update code-outline-graph-go to ${VERSION}"
          git push

  # ── 4. Publish APT / RPM / APK package repositories ─────────────────────────
  publish-repos:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: bin-*
          merge-multiple: true
          path: release-assets/

      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: release-assets/
        continue-on-error: true

      - name: Install repo tools
        run: |
          sudo apt-get install -y \
            dpkg-dev \
            createrepo-c \
            apt-utils

      - name: Clone packages repo
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          git clone \
            "https://x-access-token:${PACKAGES_TOKEN}@github.com/rushikeshsakharleofficial/packages.git" \
            packages-repo

      - name: Build APT repository
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          PKGREPO=packages-repo

          mkdir -p "${PKGREPO}/apt/pool/main"
          mkdir -p "${PKGREPO}/apt/dists/stable/main/binary-amd64"

          # Copy .deb into pool
          cp release-assets/*.deb "${PKGREPO}/apt/pool/main/" || true

          # Generate Packages index
          (cd "${PKGREPO}/apt" && dpkg-scanpackages pool/main /dev/null 2>/dev/null \
            > dists/stable/main/binary-amd64/Packages)
          gzip -9 -k "${PKGREPO}/apt/dists/stable/main/binary-amd64/Packages"

          # Generate Release
          cat > "${PKGREPO}/apt/dists/stable/Release" << RELEASE
          Origin: rushikeshsakharleofficial
          Label: rushikesh packages
          Suite: stable
          Codename: stable
          Architectures: amd64
          Components: main
          Description: Package repository for rushikeshsakharleofficial tools
          RELEASE

          # Checksums for Release
          (cd "${PKGREPO}/apt/dists/stable" && \
            md5sum main/binary-amd64/Packages main/binary-amd64/Packages.gz >> Release && \
            sha256sum main/binary-amd64/Packages main/binary-amd64/Packages.gz >> Release)

          echo "APT repo built:"
          ls -lh "${PKGREPO}/apt/dists/stable/main/binary-amd64/"

      - name: Build RPM repository
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          PKGREPO=packages-repo

          mkdir -p "${PKGREPO}/rpm/x86_64"

          # Copy RPM packages
          cp release-assets/*.rpm "${PKGREPO}/rpm/x86_64/" || true

          # Generate repodata
          createrepo_c "${PKGREPO}/rpm/x86_64/"

          # Write .repo file
          cat > "${PKGREPO}/rpm/rushikesh.repo" << REPOFILE
          [rushikesh]
          name=Rushikesh Sakharle - Tools
          baseurl=https://rushikeshsakharleofficial.github.io/packages/rpm/x86_64/
          enabled=1
          gpgcheck=0
          type=rpm
          REPOFILE

          echo "RPM repo built:"
          ls -lh "${PKGREPO}/rpm/x86_64/"

      - name: Build APK repository index
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          PKGREPO=packages-repo

          mkdir -p "${PKGREPO}/apk/edge/main/x86_64"

          # Copy APK packages
          cp release-assets/*.apk "${PKGREPO}/apk/edge/main/x86_64/" || true

          # Generate a simple APKINDEX (without signing — users use --allow-untrusted or add key)
          # Install apk-tools for proper index generation
          sudo apt-get install -y apk-tools 2>/dev/null || true

          if command -v apk &>/dev/null; then
            (cd "${PKGREPO}/apk/edge/main/x86_64" && \
              apk index -o APKINDEX.tar.gz *.apk 2>/dev/null || true)
          else
            # Fallback: create a minimal APKINDEX manually
            for f in "${PKGREPO}"/apk/edge/main/x86_64/*.apk; do
              [ -f "$f" ] || continue
              BNAME=$(basename "$f")
              echo "C:$(sha256sum "$f" | awk '{print $1}')"
              echo "P:code-outline-graph-go"
              echo "V:${VER}-r0"
              echo "A:x86_64"
              echo "T:Go code indexing and search MCP server"
              echo "U:https://github.com/rushikeshsakharleofficial/gocode-outline-graph"
              echo "L:MIT"
              echo ""
            done > /tmp/APKINDEX

            gzip -9 -c /tmp/APKINDEX > "${PKGREPO}/apk/edge/main/x86_64/APKINDEX.tar.gz" || \
              tar czf "${PKGREPO}/apk/edge/main/x86_64/APKINDEX.tar.gz" /tmp/APKINDEX 2>/dev/null || true
          fi

          echo "APK dir:"
          ls -lh "${PKGREPO}/apk/edge/main/x86_64/"

      - name: Update packages repo README with latest version
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VER="${VERSION#v}"
          cat > packages-repo/README.md << README
          # Package Repository

          Package repository for [rushikeshsakharleofficial](https://github.com/rushikeshsakharleofficial) tools.
          Hosted at: \`https://rushikeshsakharleofficial.github.io/packages/\`

          **Latest version: ${VERSION}**

          ---

          ## code-outline-graph-go

          Go code indexing and search MCP server.

          ### Debian / Ubuntu (apt)

          \`\`\`bash
          echo "deb [trusted=yes arch=amd64] https://rushikeshsakharleofficial.github.io/packages/apt stable main" \\
            | sudo tee /etc/apt/sources.list.d/rushikesh.list
          sudo apt update
          sudo apt install code-outline-graph-go
          \`\`\`

          ### RHEL / Fedora / CentOS (dnf/yum)

          \`\`\`bash
          sudo curl -fsSL https://rushikeshsakharleofficial.github.io/packages/rpm/rushikesh.repo \\
            -o /etc/yum.repos.d/rushikesh.repo
          sudo dnf install code-outline-graph-go
          # or: sudo yum install code-outline-graph-go
          \`\`\`

          ### openSUSE (zypper)

          \`\`\`bash
          sudo zypper addrepo https://rushikeshsakharleofficial.github.io/packages/rpm/rushikesh.repo
          sudo zypper install code-outline-graph-go
          \`\`\`

          ### Alpine Linux (apk)

          \`\`\`bash
          echo "https://rushikeshsakharleofficial.github.io/packages/apk/edge/main" \\
            | sudo tee -a /etc/apk/repositories
          sudo apk update --allow-untrusted
          sudo apk add code-outline-graph-go --allow-untrusted
          \`\`\`

          ### Any platform (install script)

          \`\`\`bash
          curl -fsSL https://raw.githubusercontent.com/rushikeshsakharleofficial/gocode-outline-graph/main/install.sh | bash
          \`\`\`
          README

      - name: Push to packages repo
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          cd packages-repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          git commit -m "Update packages for ${VERSION}" || echo "Nothing to commit"
          git push
