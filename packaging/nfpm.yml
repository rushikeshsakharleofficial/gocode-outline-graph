# nfpm.yml — config for building deb/rpm/apk packages.
# Usage (from repo root after building the binary there):
#   VERSION=1.1.0 nfpm pkg --packager deb --config packaging/nfpm.yml --target ./dist/
#   VERSION=1.1.0 nfpm pkg --packager rpm --config packaging/nfpm.yml --target ./dist/
#   VERSION=1.1.0 nfpm pkg --packager apk --config packaging/nfpm.yml --target ./dist/
#   VERSION=1.1.0 nfpm pkg --packager archlinux --config packaging/nfpm.yml --target ./dist/

name: code-outline-graph-go
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Rushikesh Sakharle <ramsharath@instantly.ai>
description: |
  Go code indexing and search MCP server.
  Parses source files with tree-sitter, stores symbols in SQLite FTS5,
  and exposes the index as an MCP server over stdio.
  Supports: python, javascript, typescript, tsx, go, rust, java, c, cpp, ruby, bash
vendor: Rushikesh Sakharle
homepage: https://github.com/rushikeshsakharleofficial/gocode-outline-graph
license: MIT

contents:
  - src: code-outline-graph-go
    dst: /usr/bin/code-outline-graph-go
    file_info:
      mode: 0755

overrides:
  deb:
    depends:
      - libc6
  rpm:
    depends:
      - glibc
  apk:
    depends:
      - musl
